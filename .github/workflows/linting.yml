name: Lint

on:
  pull_request:
    branches:
      - main

jobs:
  run-linters:
    if: github.event.pull_request.draft == false
    name: Run linters
    runs-on: ubuntu-latest

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run linters
        run: npx prettier --check .
